// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getRoleConfig(roleId) { return LEADER_ROLES.find(r => r.id === roleId) || LEADER_ROLES[LEADER_ROLES.length - 1]; }

function Avatar({ person, size = 40, showRole = false }) {
  const role = getRoleConfig(person.role);
  const initials = person.name.split(" ").slice(0, 2).map(n => n[0]).join("");
  return (
    <div style={{ position: "relative", flexShrink: 0 }}>
      <div style={{ width: size, height: size, borderRadius: Math.round(size * 0.27), background: person.photo ? "transparent" : `${role.color}18`, border: `1.5px solid ${role.color}35`, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
        {person.photo
          ? <img src={person.photo} alt={person.name} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
          : <span style={{ fontSize: size * 0.34, fontWeight: 700, color: role.color }}>{initials}</span>}
      </div>
      {showRole && <div style={{ position: "absolute", bottom: -3, right: -3, width: 12, height: 12, borderRadius: "50%", background: role.color, border: "1.5px solid #080e1c", boxShadow: `0 0 6px ${role.color}66` }} />}
    </div>
  );
}

function RoleBadge({ roleId, small = false }) {
  const r = getRoleConfig(roleId);
  return (
    <span style={{ background: `${r.color}14`, color: r.color, border: `1px solid ${r.color}28`, borderRadius: 5, padding: small ? "1px 7px" : "3px 9px", fontSize: small ? 9 : 11, fontWeight: 700, letterSpacing: "0.02em", display: "inline-flex", alignItems: "center", gap: 4 }}>
      <Briefcase size={small ? 8 : 9} /> {r.label}
    </span>
  );
}

// ─── MAP ──────────────────────────────────────────────────────────────────────
// Fully self-contained SVG map — no external resources needed
function RioMap({ showMilitants = true, showDemands = true, showPoles = true, height = 420, militants }) {
  const [selected, setSelected] = useState(null);

  // Bounding box: lat -23.08→-22.74, lng -43.80→-43.10
  const LAT_MIN = -23.08, LAT_MAX = -22.74;
  const LNG_MIN = -43.80, LNG_MAX = -43.10;
  const W = 900, H = 560;
  const proj = (lat, lng) => ({
    x: ((lng - LNG_MIN) / (LNG_MAX - LNG_MIN)) * W,
    y: ((LAT_MAX - lat) / (LAT_MAX - LAT_MIN)) * H,
  });

  const polePts   = POLES.map(p => ({ ...p, ...proj(p.lat, p.lng) }));
  const milPts    = militants.map(m => { const p = POLES.find(x => x.name === m.pole); return { ...m, ...proj(m.lat, m.lng), color: p?.color || "#2563eb" }; });
  const demandPts = DEMANDS.map(d => ({ ...d, ...proj(d.lat, d.lng), sc: { pendente: "#f59e0b", em_andamento: "#2563eb", resolvido: "#22c55e" }[d.status] || "#94a3b8" }));

  // Simplified Rio de Janeiro street grid / neighborhood shapes (SVG paths, projected)
  // These are approximate outlines giving a real cartographic feel
  const neighborhoods = [
    { name: "Centro",        d: "M460,255 L490,240 L510,250 L505,275 L475,280 Z",                    fill: "#1a2a3a" },
    { name: "Tijuca",        d: "M370,200 L430,185 L450,210 L440,240 L400,245 L375,225 Z",           fill: "#162030" },
    { name: "Vila Isabel",   d: "M340,230 L375,220 L380,248 L350,255 Z",                             fill: "#172232" },
    { name: "Méier",         d: "M295,195 L345,185 L355,215 L330,230 L300,220 Z",                    fill: "#141e2e" },
    { name: "Penha",         d: "M185,185 L240,175 L255,205 L240,225 L195,215 Z",                    fill: "#121c2c" },
    { name: "Ramos",         d: "M240,230 L280,220 L290,245 L260,255 L235,248 Z",                    fill: "#131d2d" },
    { name: "Santa Teresa",  d: "M475,280 L510,270 L520,295 L490,305 L470,295 Z",                    fill: "#1a2a3a" },
    { name: "Botafogo",      d: "M480,335 L510,325 L525,350 L510,370 L482,362 Z",                    fill: "#162030" },
    { name: "Copacabana",    d: "M490,375 L520,360 L540,385 L525,405 L495,400 Z",                    fill: "#141e2e" },
    { name: "Ipanema",       d: "M520,390 L555,375 L568,398 L550,415 L522,410 Z",                    fill: "#162232" },
    { name: "Barra",         d: "M555,415 L630,400 L650,430 L620,455 L560,448 Z",                    fill: "#121c2c" },
    { name: "Andaraí",       d: "M395,250 L435,240 L440,265 L415,272 L395,262 Z",                    fill: "#152030" },
    { name: "Catete",        d: "M468,305 L498,295 L505,318 L480,325 Z",                             fill: "#1a2a3a" },
    { name: "Flamengo",      d: "M465,315 L498,305 L505,332 L475,340 Z",                             fill: "#172030" },
    { name: "Glória",        d: "M456,300 L480,292 L485,310 L462,316 Z",                             fill: "#141e2e" },
    { name: "Bangu",         d: "M95,270 L155,255 L165,290 L140,310 L100,300 Z",                     fill: "#121c2c" },
    { name: "Campo Grande",  d: "M80,320 L145,305 L155,340 L120,360 L82,348 Z",                      fill: "#132030" },
    { name: "Jacarepaguá",   d: "M250,310 L330,295 L345,335 L310,355 L255,345 Z",                    fill: "#142030" },
    { name: "Recreio",       d: "M430,430 L510,415 L525,445 L495,462 L432,455 Z",                    fill: "#121c2c" },
    { name: "Ilha Gov.",     d: "M530,155 L590,145 L605,175 L575,190 L532,180 Z",                    fill: "#131e2e" },
    { name: "Maré",          d: "M430,200 L465,192 L470,215 L445,220 Z",                             fill: "#142232" },
    { name: "São Cristóvão", d: "M438,230 L470,220 L478,248 L455,255 L435,248 Z",                    fill: "#162535" },
  ];

  // Main roads / highways (approximate paths)
  const roads = [
    { d: "M100,290 Q200,270 350,255 Q430,248 510,255", w: 2.5, color: "#2a3f55" },   // Av. Brasil
    { d: "M370,200 Q410,220 450,250 Q475,275 480,320", w: 2,   color: "#243448" },   // Radial Oeste
    { d: "M340,230 Q380,245 415,270 Q445,295 462,315", w: 1.5, color: "#1e2e40" },   // Rua Uruguai
    { d: "M490,250 Q495,280 495,320 Q495,355 495,400", w: 2,   color: "#243448" },   // Linha Vermelha
    { d: "M510,255 Q550,240 590,230 Q640,218 700,210", w: 1.5, color: "#1e2e40" },   // Via Dutra
    { d: "M460,320 Q470,360 490,400 Q510,435 530,460", w: 2,   color: "#243448" },   // Lagoa–Barra
    { d: "M350,255 Q390,265 430,260 Q460,258 490,255", w: 1.5, color: "#1e2e40" },   // Radial N
    { d: "M255,210 Q300,208 345,205 Q370,202 400,200", w: 1.5, color: "#1e2e40" },   // Metrô line
  ];

  // Water bodies
  const water = [
    // Guanabara Bay (simplified)
    { d: "M490,180 Q560,160 640,150 Q720,145 790,160 Q830,180 840,220 Q820,260 780,280 Q720,295 650,290 Q590,285 545,270 Q510,258 490,250 Q480,230 490,180 Z", fill: "#0c1e35" },
    // Lagoa Rodrigo de Freitas
    { d: "M530,358 Q555,348 575,358 Q582,372 572,384 Q555,392 538,384 Q528,372 530,358 Z", fill: "#0c1e35" },
    // Atlantic coast line
    { d: "M490,400 Q520,410 555,415 Q600,425 645,432 Q700,440 760,445 Q800,448 840,450", fill: "none", stroke: "#0c1e35", sw: 8 },
  ];

  return (
    <div style={{ position: "relative", borderRadius: 16, overflow: "hidden", border: "1px solid rgba(255,255,255,0.08)", background: "#0a1422", userSelect: "none" }}>
      <svg
        viewBox={`0 0 ${W} ${H}`}
        style={{ width: "100%", height, display: "block" }}
        onClick={() => setSelected(null)}
      >
        <defs>
          <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
            <stop offset="0%"   stopColor="#0e1c2e" />
            <stop offset="100%" stopColor="#07111e" />
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="softglow">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        {/* Background */}
        <rect width={W} height={H} fill="url(#bgGrad)" />

        {/* Grid lines */}
        {[...Array(12)].map((_,i) => <line key={`h${i}`} x1={0} y1={i*H/11} x2={W} y2={i*H/11} stroke="rgba(255,255,255,0.025)" strokeWidth={1} />)}
        {[...Array(16)].map((_,i) => <line key={`v${i}`} x1={i*W/15} y1={0} x2={i*W/15} y2={H} stroke="rgba(255,255,255,0.025)" strokeWidth={1} />)}

        {/* Water bodies */}
        {water.map((w, i) => (
          w.fill && w.fill !== "none"
            ? <path key={i} d={w.d} fill={w.fill} opacity={0.9} />
            : <path key={i} d={w.d} fill="none" stroke={w.fill === "none" ? w.stroke || "#0c1e35" : w.fill} strokeWidth={w.sw || 1} />
        ))}

        {/* Neighborhoods */}
        {neighborhoods.map(n => (
          <path key={n.name} d={n.d} fill={n.fill} stroke="rgba(255,255,255,0.06)" strokeWidth={0.8} opacity={0.95} />
        ))}

        {/* Roads */}
        {roads.map((r, i) => (
          <path key={i} d={r.d} fill="none" stroke={r.color} strokeWidth={r.w} strokeLinecap="round" />
        ))}

        {/* Neighborhood labels */}
        {[
          { name: "Centro",       x: 485, y: 264 },
          { name: "Tijuca",       x: 408, y: 218 },
          { name: "Méier",        x: 322, y: 208 },
          { name: "Penha",        x: 218, y: 200 },
          { name: "Copacabana",   x: 514, y: 390 },
          { name: "Botafogo",     x: 504, y: 346 },
          { name: "Bangu",        x: 126, y: 280 },
          { name: "Barra",        x: 600, y: 430 },
          { name: "Jacarepaguá",  x: 295, y: 327 },
          { name: "Ilha Gov.",    x: 568, y: 165 },
        ].map(l => (
          <text key={l.name} x={l.x} y={l.y} textAnchor="middle" fill="rgba(148,163,184,0.5)" fontSize={8.5} fontFamily="Sora,sans-serif" fontWeight={500}>{l.name}</text>
        ))}

        {/* Guanabara Bay label */}
        <text x={660} y={215} textAnchor="middle" fill="rgba(96,165,250,0.3)" fontSize={11} fontFamily="Sora,sans-serif" fontStyle="italic">Baía de Guanabara</text>

        {/* Pole zones */}
        {showPoles && polePts.map(p => (
          <g key={p.id}>
            <circle cx={p.x} cy={p.y} r={62} fill={p.color} opacity={0.07} />
            <circle cx={p.x} cy={p.y} r={62} fill="none" stroke={p.color} strokeWidth={1} strokeDasharray="5 4" opacity={0.3} />
            <rect x={p.x - 42} y={p.y - 86} width={84} height={16} rx={4} fill="rgba(8,14,26,0.82)" />
            <text x={p.x} y={p.y - 75} textAnchor="middle" fill={p.color} fontSize={9.5} fontWeight={700} fontFamily="Sora,sans-serif">{p.name}</text>
          </g>
        ))}

        {/* Demand triangles */}
        {showDemands && demandPts.map(d => {
          const sel = selected?.id === d.id && selected?._t === "demand";
          return (
            <g key={d.id} style={{ cursor: "pointer" }} onClick={e => { e.stopPropagation(); setSelected(sel ? null : { ...d, _t: "demand" }); }}>
              <polygon
                points={`${d.x},${d.y - 10} ${d.x - 8},${d.y + 6} ${d.x + 8},${d.y + 6}`}
                fill={d.sc} opacity={sel ? 1 : 0.9}
                filter="url(#glow)"
              />
              {sel && <polygon points={`${d.x},${d.y - 14} ${d.x - 11},${d.y + 8} ${d.x + 11},${d.y + 8}`} fill="none" stroke={d.sc} strokeWidth={1.5} opacity={0.6} />}
            </g>
          );
        })}

        {/* Militant dots */}
        {showMilitants && milPts.map(m => {
          const r = 4.5 + m.votes * 0.065;
          const sel = selected?.id === m.id && selected?._t === "militant";
          return (
            <g key={m.id} style={{ cursor: "pointer" }} onClick={e => { e.stopPropagation(); setSelected(sel ? null : { ...m, _t: "militant" }); }}>
              <circle cx={m.x} cy={m.y} r={r * 3} fill={m.color} opacity={0.07} />
              <circle cx={m.x} cy={m.y} r={r * 1.6} fill={m.color} opacity={0.18} />
              <circle cx={m.x} cy={m.y} r={r} fill={m.color} opacity={sel ? 1 : 0.85} filter="url(#glow)" />
              {sel && <circle cx={m.x} cy={m.y} r={r + 6} fill="none" stroke={m.color} strokeWidth={1.5} opacity={0.55} />}
            </g>
          );
        })}
      </svg>

      {/* Info popup */}
      {selected && (
        <div style={{ position: "absolute", bottom: 14, left: 14, background: "rgba(8,14,28,0.97)", border: "1px solid rgba(37,99,235,0.22)", borderRadius: 12, padding: "13px 16px", minWidth: 220, zIndex: 10, backdropFilter: "blur(12px)" }}>
          {selected._t === "militant" ? (
            <>
              <div style={{ fontWeight: 700, color: "#e2e8f0", fontSize: 13, marginBottom: 4 }}>{selected.name}</div>
              <RoleBadge roleId={selected.role} small />
              <div style={{ color: "#475569", fontSize: 11, marginTop: 6, marginBottom: 2 }}>{selected.neighborhood} — {selected.pole}</div>
              <div style={{ color: "#475569", fontSize: 11, marginBottom: 9 }}>{selected.phone}</div>
              <div style={{ display: "flex", gap: 5 }}>
                <span style={{ background: `${selected.color}18`, color: selected.color, borderRadius: 5, padding: "2px 8px", fontSize: 9, fontWeight: 700 }}>{selected.votes} votos est.</span>
                <span style={{ background: selected.status === "ativo" ? "rgba(34,197,94,0.12)" : "rgba(239,68,68,0.12)", color: selected.status === "ativo" ? "#4ade80" : "#f87171", borderRadius: 5, padding: "2px 8px", fontSize: 9, fontWeight: 700 }}>{selected.status}</span>
              </div>
            </>
          ) : (
            <>
              <div style={{ fontWeight: 700, color: "#e2e8f0", fontSize: 13, marginBottom: 4 }}>{selected.type}</div>
              <div style={{ color: "#475569", fontSize: 11, marginBottom: 2 }}>{selected.address}</div>
              <div style={{ color: "#475569", fontSize: 11, marginBottom: 9 }}>Reportado por {selected.reportedBy}</div>
              <span style={{ background: `${selected.sc}18`, color: selected.sc, borderRadius: 5, padding: "2px 8px", fontSize: 9, fontWeight: 700 }}>{selected.status.replace("_", " ")}</span>
            </>
          )}
          <button onClick={() => setSelected(null)} style={{ position: "absolute", top: 8, right: 8, background: "none", border: "none", color: "#475569", cursor: "pointer", display: "flex" }}><X size={12} /></button>
        </div>
      )}

      {/* Legend */}
      <div style={{ position: "absolute", top: 12, right: 12, display: "flex", flexDirection: "column", gap: 5, zIndex: 10 }}>
        {showMilitants && (
          <div style={{ background: "rgba(8,14,28,0.88)", borderRadius: 6, padding: "4px 9px", fontSize: 10, color: "#64748b", display: "flex", alignItems: "center", gap: 6, border: "1px solid rgba(255,255,255,0.06)" }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#2563eb", boxShadow: "0 0 5px #2563eb" }} />
            Militantes
          </div>
        )}
        {showDemands && (
          <div style={{ background: "rgba(8,14,28,0.88)", borderRadius: 6, padding: "4px 9px", fontSize: 10, color: "#64748b", display: "flex", alignItems: "center", gap: 6, border: "1px solid rgba(255,255,255,0.06)" }}>
            <div style={{ width: 0, height: 0, borderLeft: "5px solid transparent", borderRight: "5px solid transparent", borderBottom: "8px solid #f59e0b" }} />
            Demandas
          </div>
        )}
        {showPoles && (
          <div style={{ background: "rgba(8,14,28,0.88)", borderRadius: 6, padding: "4px 9px", fontSize: 10, color: "#64748b", display: "flex", alignItems: "center", gap: 6, border: "1px solid rgba(255,255,255,0.06)" }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", border: "1.5px dashed #0891b2" }} />
            Zonas
          </div>
        )}
      </div>

      {/* Scale indicator */}
      <div style={{ position: "absolute", bottom: 12, right: 12, display: "flex", alignItems: "center", gap: 5, zIndex: 10 }}>
        <div style={{ width: 40, height: 2, background: "#334155" }} />
        <span style={{ fontSize: 9, color: "#334155" }}>~5 km</span>
      </div>
    </div>
  );
}

// ─── PROFILE MODAL ────────────────────────────────────────────────────────────
function ProfileModal({ person, onClose, onSave, isAdmin }) {
  const [form, setForm] = useState({ ...person });
  const fileRef = useRef(null);
  const handlePhoto = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setForm(f => ({ ...f, photo: ev.target.result }));
    reader.readAsDataURL(file);
  };
  const rc = getRoleConfig(form.role);
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.72)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }} onClick={onClose}>
      <div style={{ background: "#0d1626", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 20, width: "100%", maxWidth: 510, maxHeight: "90vh", overflowY: "auto", padding: 28 }} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
          <span style={{ fontWeight: 800, color: "#f1f5f9", fontSize: 16 }}>{isAdmin ? "Editar Perfil" : "Perfil"}</span>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#475569", cursor: "pointer", display: "flex" }}><X size={17} /></button>
        </div>
        {/* Photo */}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", marginBottom: 24, gap: 10 }}>
          <div style={{ position: "relative" }}>
            <div style={{ width: 84, height: 84, borderRadius: 20, background: `${rc.color}18`, border: `2px solid ${rc.color}35`, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
              {form.photo ? <img src={form.photo} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <span style={{ fontSize: 30, fontWeight: 700, color: rc.color }}>{form.name.split(" ").slice(0,2).map(n=>n[0]).join("")}</span>}
            </div>
            {isAdmin && (
              <button onClick={() => fileRef.current.click()} style={{ position: "absolute", bottom: -5, right: -5, width: 26, height: 26, borderRadius: "50%", background: "#2563eb", border: "2px solid #0d1626", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
                <Camera size={11} color="#fff" />
              </button>
            )}
            <input ref={fileRef} type="file" accept="image/*" onChange={handlePhoto} style={{ display: "none" }} />
          </div>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontWeight: 700, color: "#e2e8f0", fontSize: 16, marginBottom: 6 }}>{form.name}</div>
            <RoleBadge roleId={form.role} />
          </div>
        </div>
        {isAdmin ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div>
              <label style={labelStyle}>Função no Gabinete</label>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                {LEADER_ROLES.map(r => (
                  <button key={r.id} onClick={() => setForm(f => ({ ...f, role: r.id }))}
                    style={{ background: form.role === r.id ? `${r.color}16` : "rgba(255,255,255,0.03)", border: `1px solid ${form.role === r.id ? r.color + "45" : "rgba(255,255,255,0.07)"}`, borderRadius: 9, padding: "8px 11px", color: form.role === r.id ? r.color : "#475569", fontSize: 12, fontWeight: 600, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 7, fontFamily: "'Sora',sans-serif", transition: "all 0.15s" }}>
                    <div style={{ width: 7, height: 7, borderRadius: "50%", background: r.color, flexShrink: 0 }} />
                    {r.label}
                    {form.role === r.id && <Check size={10} style={{ marginLeft: "auto" }} />}
                  </button>
                ))}
              </div>
            </div>
            {[{ key:"name", label:"Nome Completo", type:"text" },{ key:"phone", label:"Telefone", type:"text" },{ key:"neighborhood", label:"Bairro", type:"text" },{ key:"birthday", label:"Data de Nascimento", type:"date" }].map(f => (
              <div key={f.key}>
                <label style={labelStyle}>{f.label}</label>
                <input type={f.type} value={form[f.key]||""} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} style={inputStyle} />
              </div>
            ))}
            <div>
              <label style={labelStyle}>Observações</label>
              <textarea value={form.bio||""} onChange={e=>setForm(p=>({...p,bio:e.target.value}))} rows={3} style={{ ...inputStyle, resize:"vertical", lineHeight:1.6 }} />
            </div>
            <div>
              <label style={labelStyle}>Status</label>
              <div style={{ display:"flex", gap:8 }}>
                {["ativo","inativo"].map(s=>(
                  <button key={s} onClick={()=>setForm(f=>({...f,status:s}))}
                    style={{ flex:1, background:form.status===s?(s==="ativo"?"rgba(34,197,94,0.12)":"rgba(239,68,68,0.12)"):"rgba(255,255,255,0.03)", border:`1px solid ${form.status===s?(s==="ativo"?"rgba(34,197,94,0.3)":"rgba(239,68,68,0.3)"):"rgba(255,255,255,0.07)"}`, borderRadius:9, padding:"8px", color:form.status===s?(s==="ativo"?"#4ade80":"#f87171"):"#475569", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"'Sora',sans-serif", textTransform:"capitalize" }}>
                    {s}
                  </button>
                ))}
              </div>
            </div>
            <div style={{ display:"flex", gap:9, marginTop:4 }}>
              <button onClick={onClose} style={{ flex:1, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:10, padding:"10px", color:"#64748b", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'Sora',sans-serif" }}>Cancelar</button>
              <button onClick={()=>{onSave(form);onClose();}} style={{ flex:2, background:"linear-gradient(135deg,#2563eb,#0891b2)", border:"none", borderRadius:10, padding:"10px", color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'Sora',sans-serif" }}>Salvar Alterações</button>
            </div>
          </div>
        ) : (
          <div style={{ display:"flex", flexDirection:"column", gap:11 }}>
            {[{label:"Pólo",value:form.pole},{label:"Bairro",value:form.neighborhood},{label:"Telefone",value:form.phone},{label:"Status",value:form.status}].map(item=>(
              <div key={item.label} style={{ display:"flex", justifyContent:"space-between", borderBottom:"1px solid rgba(255,255,255,0.04)", paddingBottom:9 }}>
                <span style={{ color:"#475569", fontSize:12 }}>{item.label}</span>
                <span style={{ color:"#e2e8f0", fontSize:12, fontWeight:600 }}>{item.value}</span>
              </div>
            ))}
            {form.bio && <p style={{ color:"#64748b", fontSize:12, lineHeight:1.6, margin:0 }}>{form.bio}</p>}
            <button onClick={onClose} style={{ marginTop:6, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:10, padding:"10px", color:"#64748b", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'Sora',sans-serif" }}>Fechar</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── URGENCY BANNER ───────────────────────────────────────────────────────────
function UrgencyBanner({ posts, onNavigate }) {
  const [dismissed, setDismissed] = useState([]);
  const visible = posts.filter(p => p.urgent && p.pinned && !dismissed.includes(p.id));
  if (!visible.length) return null;
  const post = visible[0];
  return (
    <div style={{ position:"relative", background:"linear-gradient(135deg,rgba(239,68,68,0.1),rgba(220,38,38,0.05))", border:"1px solid rgba(239,68,68,0.3)", borderLeft:"4px solid #ef4444", borderRadius:12, padding:"12px 17px", marginBottom:18, display:"flex", alignItems:"flex-start", gap:13, flexWrap:"wrap", animation:"urgencyPulse 3s ease-in-out infinite", overflow:"hidden" }}>
      <div style={{ position:"absolute", inset:0, background:"linear-gradient(90deg,transparent,rgba(239,68,68,0.03),transparent)", animation:"sweep 3s linear infinite", pointerEvents:"none" }} />
      <div style={{ width:36, height:36, borderRadius:10, background:"rgba(239,68,68,0.12)", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}><AlertCircle size={15} color="#ef4444"/></div>
      <div style={{ flex:1, minWidth:160 }}>
        <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:3 }}>
          <span style={{ background:"rgba(239,68,68,0.16)", color:"#fca5a5", borderRadius:4, padding:"1px 7px", fontSize:9, fontWeight:800, letterSpacing:"0.08em", textTransform:"uppercase" }}>Urgente</span>
          <span style={{ color:"#fca5a5", fontWeight:700, fontSize:13 }}>{post.title}</span>
        </div>
        <p style={{ color:"#fecaca", fontSize:11, margin:0, lineHeight:1.5, opacity:0.78 }}>{post.body.slice(0,105)}{post.body.length>105?"…":""}</p>
      </div>
      <div style={{ display:"flex", gap:7, alignItems:"center" }}>
        <button onClick={()=>onNavigate("mural")} style={{ background:"rgba(239,68,68,0.16)", border:"1px solid rgba(239,68,68,0.3)", color:"#fca5a5", borderRadius:7, padding:"6px 13px", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"'Sora',sans-serif" }}>Ver no Mural</button>
        <button onClick={()=>setDismissed(d=>[...d,post.id])} style={{ background:"none", border:"none", color:"#f87171", cursor:"pointer", opacity:0.55, display:"flex" }}><X size={14}/></button>
      </div>
    </div>
  );
}

// ─── SECTION TITLE ────────────────────────────────────────────────────────────
function SectionTitle({ children }) {
  return <div style={{ fontSize:10, fontWeight:700, color:"#334155", marginBottom:9, letterSpacing:"0.09em", textTransform:"uppercase" }}>{children}</div>;
}

// ─── STAT CARD ────────────────────────────────────────────────────────────────
function StatCard({ icon:Icon, label, value, sub, color, trend }) {
  return (
    <div style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.05)", borderRadius:13, padding:"17px 19px", position:"relative", overflow:"hidden", transition:"transform 0.2s,border-color 0.2s" }}
      onMouseEnter={e=>{e.currentTarget.style.borderColor=`${color}30`;e.currentTarget.style.transform="translateY(-2px)";}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.05)";e.currentTarget.style.transform="translateY(0)";}}>
      <div style={{ position:"absolute", top:-14, right:-14, width:60, height:60, borderRadius:"50%", background:`${color}0e`, filter:"blur(14px)" }}/>
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:11 }}>
        <div style={{ width:34, height:34, borderRadius:9, background:`${color}14`, display:"flex", alignItems:"center", justifyContent:"center" }}><Icon size={15} color={color}/></div>
        {trend!=null&&<div style={{ display:"flex", alignItems:"center", gap:3, color:trend>0?"#22c55e":"#ef4444", fontSize:10, fontWeight:700 }}>{trend>0?<ArrowUp size={10}/>:<ArrowDown size={10}/>}{Math.abs(trend)}%</div>}
      </div>
      <div style={{ fontSize:23, fontWeight:700, color:"#f1f5f9", letterSpacing:"-0.02em" }}>{value}</div>
      <div style={{ fontSize:12, color:"#475569", marginTop:2, fontWeight:500 }}>{label}</div>
      {sub&&<div style={{ fontSize:10, color:"#334155", marginTop:3 }}>{sub}</div>}
    </div>
  );
}

// ─── POLE CARD ────────────────────────────────────────────────────────────────
function PoleCard({ pole }) {
  const pct = Math.round((pole.militants/pole.target)*100);
  const bp  = Math.round((pole.spent/pole.budget)*100);
  return (
    <div style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.05)", borderRadius:12, padding:15, borderLeft:`3px solid ${pole.color}`, transition:"background 0.2s" }}
      onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.035)"}
      onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.02)"}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
        <div><div style={{ fontWeight:700, color:"#e2e8f0", fontSize:13 }}>{pole.name}</div><div style={{ color:"#475569", fontSize:11, marginTop:2 }}>{pole.leader}</div></div>
        <span style={{ background:`${pole.color}16`, color:pole.color, borderRadius:6, padding:"2px 8px", fontSize:11, fontWeight:700 }}>{pct}%</span>
      </div>
      <div style={{ marginBottom:5 }}>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3, fontSize:10, color:"#334155" }}><span>Militantes</span><span>{pole.militants} / {pole.target}</span></div>
        <div style={{ height:4, background:"rgba(255,255,255,0.05)", borderRadius:99, overflow:"hidden" }}><div style={{ height:"100%", width:`${pct}%`, background:pole.color, borderRadius:99 }}/></div>
      </div>
      <div style={{ paddingTop:8, borderTop:"1px solid rgba(255,255,255,0.04)", display:"flex", justifyContent:"space-between", fontSize:10 }}>

  );
}

  const filtered=[...posts].filter(p=>filter==="todos"||p.type===filter).sort((a,b)=>{if(a.pinned&&!b.pinned)return -1;if(!a.pinned&&b.pinned)return 1;if(a.urgent&&!b.urgent)return -1;if(!a.urgent&&b.urgent)return 1;return new Date(b.date)-new Date(a.date);});

                      {role==="admin"&&post.readBy.length>0&&<span style={{ color:"#2d3748", fontSize:10 }}>— {post.readBy.slice(0,2).join(", ")}{post.readBy.length>2?` +${post.readBy.length-2}`:""}</span>}
                    </div>
                    <button onClick={()=>alert(`Compartilhando no WhatsApp: "${post.title}"`)} style={{ background:"rgba(37,211,102,0.07)", border:"1px solid rgba(37,211,102,0.15)", borderRadius:6, padding:"5px 11px", color:"#25d366", fontSize:10, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:4, fontFamily:"'Sora',sans-serif" }}><MessageSquare size={10}/>Compartilhar</button>
                    {!isRead?(
                      <button onClick={()=>markRead(post.id)} style={{ background:"rgba(37,99,235,0.09)", border:"1px solid rgba(37,99,235,0.18)", borderRadius:6, padding:"5px 11px", color:"#60a5fa", fontSize:10, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:4, fontFamily:"'Sora',sans-serif" }}><CheckCheck size={10}/>Marcar como Lido</button>
                    ):(
                      <div style={{ display:"flex", alignItems:"center", gap:3, color:"#4ade80", fontSize:10, fontWeight:700 }}><CheckCheck size={10}/>Lido</div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function RankingView({ militants }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
      <div style={{ background:"rgba(124,58,237,0.06)", border:"1px solid rgba(124,58,237,0.16)", borderRadius:13, padding:"13px 17px", display:"flex", alignItems:"center", gap:11 }}>
        <div style={{ width:34, height:34, borderRadius:9, background:"rgba(124,58,237,0.13)", display:"flex", alignItems:"center", justifyContent:"center" }}><Zap size={15} color="#7c3aed"/></div>
        <div>
          <div style={{ fontWeight:700, color:"#c4b5fd", fontSize:12 }}>Ranking de Performance</div>
          <div style={{ color:"#475569", fontSize:10, marginTop:1 }}>Pontuação: Militantes × 20 + Demandas × 30</div>
        </div>
      </div>
      {RANKING.map((r,i)=>{
        const mil=militants.find(m=>m.name===r.name);
        return(
          <div key={r.pos} style={{ background:i===0?"linear-gradient(135deg,rgba(251,191,36,0.06),rgba(10,16,32,0.5))":"rgba(255,255,255,0.02)", border:i===0?"1px solid rgba(251,191,36,0.2)":"1px solid rgba(255,255,255,0.04)", borderRadius:12, padding:"13px 15px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap", transition:"all 0.2s" }}
            onMouseEnter={e=>e.currentTarget.style.transform="translateX(3px)"}
            onMouseLeave={e=>e.currentTarget.style.transform="translateX(0)"}>
            <div style={{ width:30, height:30, borderRadius:8, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:13, background:i===0?"rgba(251,191,36,0.15)":i===1?"rgba(148,163,184,0.1)":i===2?"rgba(205,127,50,0.1)":"rgba(255,255,255,0.04)", color:i===0?"#fbbf24":i===1?"#94a3b8":i===2?"#cd7f32":"#334155" }}>
              {["1°","2°","3°"][i]||r.pos}
            </div>
            {mil&&<Avatar person={mil} size={36} showRole/>}
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:700, color:"#e2e8f0", fontSize:13 }}>{r.name}</div>
              <div style={{ marginTop:3 }}><RoleBadge roleId={r.role} small/></div>
              <div style={{ color:"#475569", fontSize:10, marginTop:2 }}>{r.pole}</div>
            </div>
            <div style={{ display:"flex", gap:13 }}>
              <div style={{ textAlign:"center" }}><div style={{ color:"#60a5fa", fontWeight:700, fontSize:14 }}>{r.militants}</div><div style={{ color:"#334155", fontSize:8, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em" }}>Militantes</div></div>
              <div style={{ textAlign:"center" }}><div style={{ color:"#34d399", fontWeight:700, fontSize:14 }}>{r.demands}</div><div style={{ color:"#334155", fontSize:8, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em" }}>Demandas</div></div>
            </div>
            <div style={{ textAlign:"right", minWidth:68 }}>
              <div style={{ fontWeight:800, fontSize:18, color:i===0?"#fbbf24":"#e2e8f0" }}>{r.score.toLocaleString()}</div>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:2, marginTop:2 }}>
                {r.trend==="up"?<ArrowUp size={9} color="#22c55e"/>:<ArrowDown size={9} color="#ef4444"/>}
                <span style={{ color:r.trend==="up"?"#22c55e":"#ef4444", fontSize:9, fontWeight:700 }}>pts</span>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function PollyFlow() {
  const [tab,setTab]=useState("dashboard"); const [role,setRole]=useState("admin");
  const [notifOpen,setNotifOpen]=useState(false); const [posts,setPosts]=useState(INITIAL_POSTS);
  const [militants,setMilitants]=useState(INITIAL_MILITANTS);

  const navItems=[
    {id:"dashboard",label:"Dashboard",icon:LayoutDashboard},
    {id:"mural",label:"Mural",icon:Newspaper},
    {id:"mapa",label:"Mapa RJ",icon:Map},
    {id:"militantes",label:"Militantes",icon:Users},
    {id:"zeladoria",label:"Zeladoria",icon:Wrench},
    ...(role==="admin"?[{id:"ranking",label:"Ranking",icon:Trophy}]:[]),
  ];
  const tabTitles={ dashboard:role==="admin"?"Visão Executiva":"Operações de Campo", mural:role==="admin"?"Mural do Político":"Central de Comunicados", mapa:"Inteligência Territorial", militantes:"Gestão de Militância", zeladoria:"Módulo de Zeladoria", ranking:"Ranking de Performance" };
  const unread=posts.filter(p=>!p.readBy.includes(role==="admin"?"Dep. Carlos Vasconcelos":"Ricardo Mendes")).length;

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#060c18 0%,#090f1e 55%,#060d1a 100%)", fontFamily:"'Sora','Inter',sans-serif", color:"#e2e8f0" }}>
      <style>{`

        *{box-sizing:border-box}
        select option{background:#0d1525;color:#e2e8f0}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:rgba(37,99,235,0.2);border-radius:99px}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes urgencyPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 16px 2px rgba(239,68,68,0.08)}}
        @keyframes sweep{from{transform:translateX(-100%)}to{transform:translateX(300%)}}
      `}</style>
      <div style={{ position:"fixed", top:-180, left:-80, width:480, height:480, borderRadius:"50%", background:"radial-gradient(circle,rgba(37,99,235,0.04),transparent 70%)", pointerEvents:"none" }}/>
      <div style={{ position:"fixed", bottom:-180, right:-80, width:380, height:380, borderRadius:"50%", background:"radial-gradient(circle,rgba(8,145,178,0.03),transparent 70%)", pointerEvents:"none" }}/>

      <header style={{ position:"sticky", top:0, zIndex:50, background:"rgba(6,12,24,0.93)", backdropFilter:"blur(22px)", borderBottom:"1px solid rgba(255,255,255,0.05)", padding:"0 20px", height:56, display:"flex", alignItems:"center", gap:13 }}>
        <div style={{ display:"flex", alignItems:"center", gap:9, marginRight:7, flexShrink:0 }}>
          <div style={{ width:30, height:30, borderRadius:8, background:"linear-gradient(135deg,#1d4ed8,#0891b2)", display:"flex", alignItems:"center", justifyContent:"center" }}><Activity size={14} color="#fff"/></div>
          <div>
            <div style={{ fontWeight:800, fontSize:13, letterSpacing:"-0.03em", lineHeight:1, background:"linear-gradient(90deg,#93c5fd,#67e8f9)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>Polly Flow</div>
            <div style={{ fontSize:8, color:"#334155", fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase" }}>Inteligência Política</div>
          </div>
        </div>
        <nav style={{ display:"flex", gap:1, flex:1, overflowX:"auto" }}>
          {navItems.map(item=>(
            <button key={item.id} onClick={()=>setTab(item.id)}
              style={{ display:"flex", alignItems:"center", gap:5, padding:"6px 10px", borderRadius:7, background:tab===item.id?"rgba(37,99,235,0.11)":"transparent", border:tab===item.id?"1px solid rgba(37,99,235,0.2)":"1px solid transparent", color:tab===item.id?"#60a5fa":"#475569", fontSize:11, fontWeight:tab===item.id?700:500, cursor:"pointer", transition:"all 0.15s", fontFamily:"'Sora',sans-serif", whiteSpace:"nowrap", position:"relative" }}>
              <item.icon size={11}/>
              <span>{item.label}</span>
              {item.id==="mural"&&unread>0&&<div style={{ position:"absolute", top:3, right:3, width:5, height:5, borderRadius:"50%", background:"#ef4444", boxShadow:"0 0 4px #ef4444" }}/>}
            </button>
          ))}
        </nav>
        <div style={{ display:"flex", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.05)", borderRadius:8, padding:2, gap:2, flexShrink:0 }}>
          {[{id:"admin",label:"Admin",icon:Shield},{id:"operator",label:"Operador",icon:Radio}].map(r=>(
            <button key={r.id} onClick={()=>{setRole(r.id);if(r.id==="operator"&&tab==="ranking")setTab("dashboard");}}
              style={{ padding:"4px 10px", borderRadius:7, border:"none", cursor:"pointer", background:role===r.id?"linear-gradient(135deg,#1d4ed8,#0891b2)":"transparent", color:role===r.id?"#fff":"#475569", fontSize:10, fontWeight:700, transition:"all 0.2s", fontFamily:"'Sora',sans-serif", display:"flex", alignItems:"center", gap:4 }}>
              <r.icon size={9}/> {r.label}
            </button>
          ))}
        </div>
        <div style={{ position:"relative", flexShrink:0 }}>
          <button onClick={()=>setNotifOpen(!notifOpen)} style={{ position:"relative", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.05)", borderRadius:7, padding:"6px", cursor:"pointer", color:"#475569", display:"flex" }}>
            <Bell size={13}/>
            <div style={{ position:"absolute", top:3, right:3, width:5, height:5, borderRadius:"50%", background:"#ef4444", animation:"pulse 2s infinite", border:"1px solid #06101e" }}/>
          </button>
          {notifOpen&&(
            <div style={{ position:"absolute", right:0, top:"calc(100% + 7px)", background:"rgba(9,15,30,0.98)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:13, minWidth:245, backdropFilter:"blur(22px)", zIndex:100 }}>
              <div style={{ fontWeight:700, color:"#e2e8f0", fontSize:11, marginBottom:9, letterSpacing:"0.04em" }}>Notificações</div>
              {[{text:"Aniversariantes: Fernanda e Helena",time:"agora"},{text:"Nova demanda de alta prioridade no Catete",time:"5min"},{text:"Igor Nascimento assumiu liderança do ranking",time:"1h"}].map((n,i)=>(
                <div key={i} style={{ padding:"6px 0", borderBottom:i<2?"1px solid rgba(255,255,255,0.04)":"none" }}>
                  <div style={{ fontSize:11, color:"#94a3b8" }}>{n.text}</div>
                  <div style={{ fontSize:9, color:"#334155", marginTop:2 }}>há {n.time}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </header>

      <main style={{ maxWidth:1080, margin:"0 auto", padding:"20px 16px 84px", animation:"fadeUp 0.32s ease both" }}>
        <div style={{ marginBottom:16 }}>
          <div style={{ fontWeight:800, fontSize:19, color:"#f1f5f9", letterSpacing:"-0.025em" }}>{tabTitles[tab]}</div>
          <div style={{ color:"#334155", fontSize:10, marginTop:2, letterSpacing:"0.03em", textTransform:"uppercase", fontWeight:600 }}>
            {role==="admin"?"Visão Executiva":"Operações de Campo"} · Atualizado agora
          </div>
        </div>
        {tab!=="mural"&&<UrgencyBanner posts={posts} onNavigate={setTab}/>}
        {tab==="dashboard"  &&<DashboardView role={role} militants={militants}/>}
        {tab==="mural"      &&<MuralView role={role} posts={posts} setPosts={setPosts}/>}
        {tab==="mapa"       &&<MapView militants={militants}/>}
        {tab==="militantes" &&<MilitantsView role={role} militants={militants} setMilitants={setMilitants}/>}
        {tab==="zeladoria"  &&<ZeladoriaView/>}
        {tab==="ranking"&&role==="admin"&&<RankingView militants={militants}/>}
      </main>

      <nav style={{ position:"fixed", bottom:0, left:0, right:0, background:"rgba(6,12,24,0.97)", backdropFilter:"blur(18px)", borderTop:"1px solid rgba(255,255,255,0.04)", display:"flex", justifyContent:"space-around", padding:"7px 0 10px", zIndex:40 }}>
        {navItems.map(item=>(
          <button key={item.id} onClick={()=>setTab(item.id)}
            style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:2, background:"none", border:"none", cursor:"pointer", color:tab===item.id?"#60a5fa":"#334155", padding:"3px 9px", borderRadius:6, transition:"color 0.15s", fontFamily:"'Sora',sans-serif", position:"relative" }}>
            <item.icon size={16}/>
            <span style={{ fontSize:8, fontWeight:700, letterSpacing:"0.06em", textTransform:"uppercase" }}>{item.label}</span>
            {item.id==="mural"&&unread>0&&<div style={{ position:"absolute", top:1, right:7, width:4, height:4, borderRadius:"50%", background:"#ef4444" }}/>}
          </button>
        ))}
      </nav>
    </div>
  );
}

    // ── Mount ─────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(PollyFlow));
  </script>
</body>
</html>
